# INDEX.yaml — machine-readable doc index (single source of truth).
# Load this to map "what do I need?" -> exact path. INDEX.md is generated from it.
# RULE: entries DESCRIBE docs; never reproduce sensitive content (names, $/money, secrets).
#
# Per entry:
#   path           (required) repo-relative file or folder
#   purpose        (required) one-line, non-leaking summary
#   topics         (required) keyword tags  e.g. [setup, api, auth]
#   doc_type       (required) entry|specification|reference|analysis|planning|log|index|guide
#   authority_tier (required) entry|authoritative|reference|working|planning|meta|historical|log|archived
#   last_updated   (recommended) YYYY-MM-DD
#   read_this_when (optional) scenario triggers
#   related_files  (optional) other paths

documents:
  - path: HANDOFF.md
    purpose: What's in flight right now + recent session log.
    topics: [handoff, log, in-flight]
    doc_type: log
    authority_tier: log
    last_updated: 2026-05-27
    read_this_when:
      - resuming work — read the top NOW block first

  - path: README.md
    purpose: Public-facing overview — what apex-engine is, install, MCP setup, commands, API keys, roles & ensembles, filing-conventions.
    topics: [overview, setup, mcp, install, public]
    doc_type: guide
    authority_tier: reference
    last_updated: 2026-05-27
    read_this_when:
      - onboarding a new user / contributor
      - looking up install / setup commands
      - locating the canonical tool list (16 MCP tools)

  - path: CLAUDE.md
    purpose: Project-local architecture + engineering standards for Claude Code sessions working in apex-engine. Stable; this is "what we are," not "what's in flight" (that's HANDOFF.md).
    topics: [architecture, standards, claude-code, mcp]
    doc_type: specification
    authority_tier: authoritative
    last_updated: 2026-05-27
    related_files:
      - HANDOFF.md
      - README.md

  - path: _archive/HANDOFF-2026-05.md
    purpose: Archived historical session log — Wave 7-21 session blocks + reference subsections (Filing-conventions awareness pass, Triage ops trio, Backlog, Pitfalls, Resume-from-clean-state commands, What's in apex-engine today, Engineering decisions worth preserving, File layout, Commands) moved out of the live HANDOFF by /handoff archive in Wave 27.
    topics: [handoff, archive, history]
    doc_type: log
    authority_tier: archived
    last_updated: 2026-05-27
    read_this_when:
      - looking for pre-Wave-22 session detail not captured in git log alone
      - tracing where a moved reference section went (it's in this archive)

  - path: feedback/README.md
    purpose: Cross-instance feedback channel — how apex_report records flow from any project's Claude Code session into apex-engine's GitHub Issues via the local outbox + flush daemon. Documents the JSON schema, privacy rules, and triage rhythm.
    topics: [feedback, mcp, apex_report, github-issues, cross-instance]
    doc_type: specification
    authority_tier: authoritative
    last_updated: 2026-05-27
    read_this_when:
      - filing feedback against apex-engine from another project
      - debugging why a feedback record didn't reach GitHub
      - reviewing what data flows in an apex_report payload
